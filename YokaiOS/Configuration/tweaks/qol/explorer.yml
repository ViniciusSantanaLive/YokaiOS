---
title: Explorer Tweaks
description: Otimizacoes do File Explorer para melhor experiencia
privilege: Admin
actions:

  - !writeStatus: {status: "Configurando Explorer..."}

  # === Remover Home e Gallery
  - title: "Remover Home do Explorer"
    description: "Remove Home e abre direto em Este PC"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Classes\\CLSID\\{f874310e-b6b7-47dc-bc84-b9e6b38f5903}"
        value: "System.IsPinnedToNameSpaceTree"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "LaunchTo"
        type: "REG_DWORD"
        data: "1"

  - title: "Remover Gallery do Explorer"
    description: "Remove Gallery do Explorer"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Classes\\CLSID\\{e88865ea-0e1c-4e20-9aa6-edcd0212c87c}"
        value: "System.IsPinnedToNameSpaceTree"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Auto Folder Discovery
  - title: "Desabilitar Auto Folder Discovery"
    description: "Para de adivinhar tipo de pasta pelo conteudo"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !powershell
        command: |
          $bags = "HKCU:\Software\Classes\Local Settings\Software\Microsoft\Windows\Shell\Bags"
          $bagMRU = "HKCU:\Software\Classes\Local Settings\Software\Microsoft\Windows\Shell\BagMRU"
          Remove-Item -Path $bags -Recurse -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $bagMRU -Recurse -Force -ErrorAction SilentlyContinue
          $allFolders = "HKCU:\Software\Classes\Local Settings\Software\Microsoft\Windows\Shell\Bags\AllFolders\Shell"
          if (!(Test-Path $allFolders)) { New-Item -Path $allFolders -Force }
          New-ItemProperty -Path $allFolders -Name "FolderType" -Value "NotSpecified" -PropertyType String -Force

  # === Mostrar Extensoes de Arquivo
  - title: "Mostrar Extensoes de Arquivo"
    description: "Mostra .exe, .png, .txt, etc no Explorer"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "HideFileExt"
        type: "REG_DWORD"
        data: "0"

  # === Mostrar Arquivos Ocultos
  - title: "Mostrar Arquivos Ocultos"
    description: "Revela arquivos e pastas ocultos"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "Hidden"
        type: "REG_DWORD"
        data: "1"

  # === Desabilitar Checkboxes
  - title: "Desabilitar Checkboxes no Explorer"
    description: "Remove checkboxes de selecao de arquivos"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "AutoCheckSelect"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Navigation Pane
  - title: "Desabilitar Network no Navigation Pane"
    description: "Remove Network do painel de navegacao"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Classes\\CLSID\\{F02C1A0D-BE21-4350-88B0-7367FC96EF3C}"
        value: "System.IsPinnedToNameSpaceTree"
        type: "REG_DWORD"
        data: "0"

  # === Abrir Explorer em Este PC
  - title: "Abrir Explorer em Este PC"
    description: "Define Este PC como pasta inicial"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "LaunchTo"
        type: "REG_DWORD"
        data: "1"

  # === Desabilitar Quick Access Recent Files
  - title: "Desabilitar Arquivos Recentes"
    description: "Para de mostrar arquivos recentes no Quick Access"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer"
        value: "ShowRecent"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Quick Access Frequent Folders
  - title: "Desabilitar Pastas Frequentes"
    description: "Para de mostrar pastas frequentes no Quick Access"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer"
        value: "ShowFrequent"
        type: "REG_DWORD"
        data: "0"

  # === Melhorar Qualidade de Wallpaper
  - title: "Melhorar Qualidade de Wallpaper"
    description: "Desabilita compressao de wallpaper"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Control Panel\\Desktop"
        value: "JPEGImportQuality"
        type: "REG_DWORD"
        data: "100"

  # === Desabilitar Thumbnail Cache
  - title: "Desabilitar Thumbnail Cache"
    description: "Para de criar cache de thumbnails"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "DisableThumbnailCache"
        type: "REG_DWORD"
        data: "1"

  # === Long Paths
  - title: "Habilitar Long Paths"
    description: "Permite caminhos com mais de 260 caracteres"
    category: "Explorer"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\FileSystem"
        value: "LongPathsEnabled"
        type: "REG_DWORD"
        data: "1"

  - !writeStatus: {status: "Explorer configurado!"}
