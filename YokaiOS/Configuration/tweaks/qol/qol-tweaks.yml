---
title: Quality of Life Tweaks
description: Melhorias gerais de usabilidade
privilege: Admin
actions:

  - !writeStatus: {status: "Aplicando QoL tweaks..."}

  # === Desabilitar Aero Shake
  - title: "Desabilitar Aero Shake"
    description: "Para de minimizar janelas ao sacudir uma"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "DisallowShaking"
        type: "REG_DWORD"
        data: "1"

  # === Desabilitar Menu Delay
  - title: "Desabilitar Menu Delay"
    description: "Remove delay ao abrir menus"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Control Panel\\Desktop"
        value: "MenuShowDelay"
        type: "REG_SZ"
        data: "0"

  # === Desabilitar Mouse Hover Time
  - title: "Reduzir Mouse Hover Time"
    description: "Reduz tempo para mostrar tooltip"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Control Panel\\Mouse"
        value: "MouseHoverTime"
        type: "REG_SZ"
        data: "100"

  # === Desabilitar Windows Tips
  - title: "Desabilitar Windows Tips"
    description: "Para de mostrar dicas do Windows"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
        value: "SoftLandingEnabled"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "ShowSyncProviderNotifications"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Windows Spotlight
  - title: "Desabilitar Windows Spotlight"
    description: "Remove propaganda do Windows Spotlight"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
        value: "RotatingLockScreenEnabled"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
        value: "RotatingLockScreenOverlayEnabled"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
        value: "SubscribedContent-338387Enabled"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Lock Screen Tips
  - title: "Desabilitar Lock Screen Tips"
    description: "Remove dicas da tela de bloqueio"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
        value: "RotatingLockScreenEnabled"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Suggestions in Start
  - title: "Desabilitar Sugestoes no Start"
    description: "Remove sugestoes de apps no Menu Iniciar"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
        value: "SystemPaneSuggestionsEnabled"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
        value: "SubscribedContent-338388Enabled"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
        value: "SubscribedContent-338389Enabled"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar App Suggestions
  - title: "Desabilitar App Suggestions"
    description: "Para de sugerir apps da Store"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
        value: "SilentInstalledAppsEnabled"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Online Speech Recognition
  - title: "Desabilitar Online Speech Recognition"
    description: "Para de enviar dados de voz para Microsoft"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Speech_OneCore\\Settings\\OnlineSpeechPrivacy"
        value: "HasAccepted"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Typing Insights
  - title: "Desabilitar Typing Insights"
    description: "Para de analisar padroes de digitacao"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Input\\TIPC"
        value: "Enabled"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar App Launch Tracking
  - title: "Desabilitar App Launch Tracking"
    description: "Para de rastrear apps abertos"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "Start_TrackProgs"
        type: "REG_DWORD"
        data: "0"

  # === Verbose Boot Messages
  - title: "Mensagens Detalhadas no Boot"
    description: "Mostra mensagens detalhadas durante boot/shutdown"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\System"
        value: "VerboseStatus"
        type: "REG_DWORD"
        data: "1"

  # === BSoD Detalhado
  - title: "BSoD Detalhado"
    description: "Mostra mais informacoes em tela azul"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\CrashControl"
        value: "DisplayParameters"
        type: "REG_DWORD"
        data: "1"
      - !registryValue
        path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\CrashControl"
        value: "DisableEmoticon"
        type: "REG_DWORD"
        data: "1"

  # === Desabilitar WPBT
  - title: "Desabilitar WPBT"
    description: "Impede que fabricante execute programas no boot"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager"
        value: "DisableWpbtExecution"
        type: "REG_DWORD"
        data: "1"

  # === Desabilitar Consumer Features
  - title: "Desabilitar Consumer Features"
    description: "Windows nao instala apps automaticos da Store"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\CloudContent"
        value: "DisableWindowsConsumerFeatures"
        type: "REG_DWORD"
        data: "1"

  # === Desabilitar Tailored Experiences
  - title: "Desabilitar Tailored Experiences"
    description: "Para de usar dados diagnosticos para sugestoes"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Privacy"
        value: "TailoredExperiencesWithDiagnosticDataEnabled"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Advertising ID
  - title: "Desabilitar Advertising ID"
    description: "Remove ID unico usado para propaganda"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\AdvertisingInfo"
        value: "Enabled"
        type: "REG_DWORD"
        data: "0"

  # === Modo Escuro
  - title: "Ativar Modo Escuro"
    description: "Ativa tema escuro para sistema e apps"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
        value: "AppsUseLightTheme"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
        value: "SystemUsesLightTheme"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Transparency
  - title: "Desabilitar Transparencia"
    description: "Remove efeito de transparencia do sistema"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
        value: "EnableTransparency"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Game Bar
  - title: "Desabilitar Game Bar"
    description: "Remove Game Bar e Game DVR"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\SOFTWARE\\Microsoft\\GameBar"
        value: "UseNexusForGameBarEnabled"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKCU\\SOFTWARE\\Microsoft\\GameBar"
        value: "AutoGameModeEnabled"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\GameDVR"
        value: "AllowGameDVR"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Hibernation
  - title: "Desabilitar Hibernacao"
    description: "Libera espaco em disco e evita problemas"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !powershell
        command: "powercfg /hibernate off"
      - !registryValue
        path: "HKLM\\System\\CurrentControlSet\\Control\\Session Manager\\Power"
        value: "HibernateEnabled"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\FlyoutMenuSettings"
        value: "ShowHibernateOption"
        type: "REG_DWORD"
        data: "0"

  # === Desabilitar Activity History
  - title: "Desabilitar Activity History"
    description: "Para de salvar historico de atividades"
    category: "QoL"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\System"
        value: "EnableActivityFeed"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\System"
        value: "PublishUserActivities"
        type: "REG_DWORD"
        data: "0"

  - !writeStatus: {status: "QoL tweaks aplicados!"}
