# Remove Pinned Start Menu Items
# Removes default pinned items from Windows 11 Start Menu

---
- title: "Remove Pinned Start Menu Items"
  description: "Remove default pinned apps from Start Menu"
  category: "QoL"
  privilege: "Admin"
  actions:
    - !powershell
      command: |
        # Remove pinned items from Start Menu
        $startMenuPath = "$env:LOCALAPPDATA\Packages\Microsoft.Windows.StartMenuExperienceHost_cw5n1h2txyewy\LocalState"
        if (Test-Path $startMenuPath) {
            $file = Join-Path $startMenuPath "start2.bin"
            if (Test-Path $file) {
                Remove-Item $file -Force -ErrorAction SilentlyContinue
            }
        }
        
        # Clear recent apps
        $recentPath = "$env:APPDATA\Microsoft\Windows\Recent\AutomaticDestinations"
        if (Test-Path $recentPath) {
            Get-ChildItem $recentPath -Filter "*.automaticDestinations-ms" | Remove-Item -Force -ErrorAction SilentlyContinue
        }
        
        # Reset Start Menu layout
        $layoutPath = "$env:LOCALAPPDATA\Microsoft\Windows\Shell\LayoutModification.xml"
        if (Test-Path $layoutPath) {
            Remove-Item $layoutPath -Force -ErrorAction SilentlyContinue
        }
    - !registry
      path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Start"
      name: "Config"
      type: "REG_DWORD"
      value: "1"