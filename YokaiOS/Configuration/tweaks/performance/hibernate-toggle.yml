# Hibernate Configuration
# Toggles Hibernate and Fast Startup based on user selection

---
- title: "Disable Hibernate"
  description: "Disable hibernation and Fast Startup for cleaner boot"
  category: "Power"
  privilege: "Admin"
  option: "disable-hibernate"
  actions:
    - !cmd
      command: "powercfg /hibernate off"
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power"
      value: "HibernateEnabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Power"
      value: "HiberbootEnabled"
      type: "REG_DWORD"
      data: "0"

- title: "Keep Hibernate Enabled"
  description: "Keep hibernation and Fast Startup enabled"
  category: "Power"
  privilege: "Admin"
  option: "enable-hibernate"
  actions:
    - !cmd
      command: "powercfg /hibernate on"
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power"
      value: "HibernateEnabled"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Power"
      value: "HiberbootEnabled"
      type: "REG_DWORD"
      data: "1"
