# Disable Background Apps
# Prevents UWP apps from running in background

---
- title: "Disable Background Apps Globally"
  description: "Prevent all UWP apps from running in background"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\BackgroundAccessApplications"
      value: "GlobalUserDisabled"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\AppPrivacy"
      value: "LetAppsRunInBackground"
      type: "REG_DWORD"
      data: "2"

- title: "Disable Background Activity for Specific Apps"
  description: "Disable background activity for common apps"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\BackgroundAccessApplications\\Microsoft.WindowsCalculator_8wekyb3d8bbwe"
      value: "Disabled"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\BackgroundAccessApplications\\Microsoft.Windows.Photos_8wekyb3d8bbwe"
      value: "Disabled"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\BackgroundAccessApplications\\Microsoft.SkypeApp_kzf8qxf38zg5c"
      value: "Disabled"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\BackgroundAccessApplications\\Microsoft.MicrosoftOfficeHub_8wekyb3d8bbwe"
      value: "Disabled"
      type: "REG_DWORD"
      data: "1"
