# Win32 Priority Separation
# Optimizes CPU time allocation for gaming

---
- title: "Set Win32PrioritySeparation"
  description: "Optimize CPU scheduling for foreground applications"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl"
      value: "Win32PrioritySeparation"
      type: "REG_DWORD"
      data: "38"

- title: "Set IRQ Priority"
  description: "Prioritize hardware interrupts"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl"
      value: "IRQ8Priority"
      type: "REG_DWORD"
      data: "1"

- title: "Disable Priority Boost"
  description: "Disable dynamic priority boosting for consistent performance"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl"
      value: "ConvertibleSlateMode"
      type: "REG_DWORD"
      data: "0"
