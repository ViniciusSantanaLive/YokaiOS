# Disable Mitigations
# CPU security mitigations - balanced for gaming + anti-cheat compatibility
# Follows ReviOS approach: disable heavy mitigations, keep critical ones for anti-cheats

---
# === Anti-Cheat Compatibility Notes ===
# YokaiOS keeps the following for anti-cheat compatibility:
#   - CFG (Control Flow Guard) - Required by Vanguard (Valorant)
#   - ASLR (Address Space Layout Randomization) - Required by osu!
#   - DEP (Data Execution Prevention) - Required by most anti-cheats
# These are NOT disabled to prevent bans and maintain game compatibility.

- title: "Disable Spectre Mitigations"
  description: "Disable Spectre mitigations for better performance"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registry
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
      name: "FeatureSettingsOverride"
      type: "REG_DWORD"
      value: "3"
    - !registry
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
      name: "FeatureSettingsOverrideMask"
      type: "REG_DWORD"
      value: "3"

- title: "Disable SEHOP"
  description: "Disable Structured Exception Handling Overwrite Protection for performance"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registry
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel"
      name: "DisableExceptionChainValidation"
      type: "REG_DWORD"
      value: "1"

- title: "Disable Core Isolation (VBS/HVCI)"
  description: "Disable Virtualization-Based Security for gaming performance"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registry
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard"
      name: "EnableVirtualizationBasedSecurity"
      type: "REG_DWORD"
      value: "0"
    - !registry
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard"
      name: "RequirePlatformSecurityFeatures"
      type: "REG_DWORD"
      value: "0"
    - !registry
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\DeviceGuard\\Scenarios\\HypervisorEnforcedCodeIntegrity"
      name: "Enabled"
      type: "REG_DWORD"
      value: "0"

# === KEPT FOR ANTI-CHEAT COMPATIBILITY ===
# ASLR is NOT disabled (MoveImages stays at default 1)
# DEP is NOT disabled (bcdedit /set nx AlwaysOff is NOT applied)
# CFG is NOT disabled (required by Vanguard/Valorant)
# These mitigations have minimal performance impact but are critical for anti-cheat systems.
