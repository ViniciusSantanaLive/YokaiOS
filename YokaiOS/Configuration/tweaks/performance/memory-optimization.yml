# Memory Optimization
# Optimizes memory management for gaming

---
- title: "Optimize Memory Management"
  description: "Configure Windows memory settings for gaming"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
      value: "DisablePagingExecutive"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
      value: "LargeSystemCache"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
      value: "ClearPageFileAtShutdown"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
      value: "IoPageLockLimit"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Memory Compression"
  description: "Reduces CPU overhead from memory compression"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !powershell
      command: "Disable-MMAgent -MemoryCompression"

- title: "Disable Prefetch and Superfetch"
  description: "Prevent unnecessary disk I/O from prefetching"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management\\PrefetchParameters"
      value: "EnablePrefetcher"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management\\PrefetchParameters"
      value: "EnableSuperfetch"
      type: "REG_DWORD"
      data: "0"

- title: "Optimize NTFS Memory Usage"
  description: "Reduce NTFS memory consumption"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\FileSystem"
      value: "NtfsDisableLastAccessUpdate"
      type: "REG_DWORD"
      data: "80000003"
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\FileSystem"
      value: "NtfsDisable8dot3NameCreation"
      type: "REG_DWORD"
      data: "1"
