# Disable Paging
# Optimizes virtual memory for gaming

---
- title: "Disable Paging Executive"
  description: "Keep kernel and drivers in physical memory"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
      value: "DisablePagingExecutive"
      type: "REG_DWORD"
      data: "1"

- title: "Disable Large System Cache"
  description: "Prioritize applications over system cache"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
      value: "LargeSystemCache"
      type: "REG_DWORD"
      data: "0"

- title: "Optimize IoPageLockLimit"
  description: "Set optimal I/O page lock limit"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\Memory Management"
      value: "IoPageLockLimit"
      type: "REG_DWORD"
      data: "0"
