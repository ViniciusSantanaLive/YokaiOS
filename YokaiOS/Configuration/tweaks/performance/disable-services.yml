# Disable Unnecessary Services
# Stops and disables services that consume resources at idle

---
- title: "Disable DiagTrack (Connected User Experiences and Telemetry)"
  description: "Primary telemetry service"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !service
      name: "DiagTrack"
      startup_type: "disabled"
      state: "stopped"

- title: "Disable dmwappushservice"
  description: "WAP Push Message Routing Service"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !service
      name: "dmwappushservice"
      startup_type: "disabled"
      state: "stopped"

- title: "Disable SysMain (Superfetch)"
  description: "Preloads apps into memory; can cause stuttering in games"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !service
      name: "SysMain"
      startup_type: "disabled"
      state: "stopped"

- title: "Disable Windows Search Indexer"
  description: "Indexes files for search; consumes CPU and disk I/O"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !service
      name: "WSearch"
      startup_type: "disabled"
      state: "stopped"

- title: "Disable Windows Update Service"
  description: "Prevents automatic updates during gaming"
  category: "Performance"
  privilege: "Admin"
  actions:
    - !service
      name: "wuauserv"
      startup_type: "disabled"
      state: "stopped"

- title: "Disable Delivery Optimization"
  description: "P2P update distribution; consumes bandwidth"
