# Windows Update Configuration
# Toggles Windows Update based on user selection

---
- title: "Disable Windows Update"
  description: "Disable automatic Windows updates for gaming"
  category: "System"
  privilege: "Admin"
  option: "updates-disable"
  actions:
    - !service: {name: 'wuauserv', operation: change, startup: 4}
    - !service: {name: 'UsoSvc', operation: change, startup: 4}
    - !service: {name: 'DoSvc', operation: change, startup: 4}
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU"
      value: "NoAutoUpdate"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU"
      value: "AUOptions"
      type: "REG_DWORD"
      data: "1"

- title: "Notify Only About Updates"
  description: "Show notifications but don't auto-install"
  category: "System"
  privilege: "Admin"
  option: "updates-notify"
  actions:
    - !service: {name: 'wuauserv', operation: change, startup: 3}
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU"
      value: "NoAutoUpdate"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU"
      value: "AUOptions"
      type: "REG_DWORD"
      data: "2"

- title: "Keep Windows Update Default"
  description: "Keep automatic updates enabled"
  category: "System"
  privilege: "Admin"
  option: "updates-default"
  actions:
    - !service: {name: 'wuauserv', operation: change, startup: 2}
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU"
      value: "NoAutoUpdate"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsUpdate\\AU"
      value: "AUOptions"
      type: "REG_DWORD"
      data: "4"
