# Disable Cortana
# Removes Cortana completely

---
- title: "Disable Cortana"
  description: "Disable Cortana and voice assistant"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search"
      value: "AllowCortana"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search"
      value: "DisableWebSearch"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search"
      value: "AllowSearchToUseLocation"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search"
      value: "ConnectedSearchUseWeb"
      type: "REG_DWORD"
      data: "0"

- title: "Remove Cortana Package"
  description: "Uninstall Cortana from system"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !powershell
      command: "Get-AppxPackage Microsoft.549981C3F5F10 | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue"
