# Disable Telemetry
# Removes all Microsoft telemetry and data collection

---
- title: "Disable Telemetry Service"
  description: "Stop and disable DiagTrack service"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !service
      name: "DiagTrack"
      startup_type: "disabled"
      state: "stopped"
    - !service
      name: "dmwappushservice"
      startup_type: "disabled"
      state: "stopped"

- title: "Set Telemetry Level to Security"
  description: "Minimize telemetry data sent to Microsoft"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\DataCollection"
      value: "AllowTelemetry"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Policies\\DataCollection"
      value: "AllowTelemetry"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\AppCompat"
      value: "AITEnable"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Customer Experience Improvement Program"
  description: "Disable CEIP data collection"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\SQMClient\\Windows"
      value: "CEIPEnable"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\SQMClient\\Windows"
      value: "CEIPEnable"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Application Impact Telemetry"
  description: "Disable application telemetry"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\AppCompat"
      value: "AITEnable"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Inventory Collector"
  description: "Disable system inventory collection"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\AppCompat"
      value: "DisableInventory"
      type: "REG_DWORD"
      data: "1"

- title: "Disable Steps Recorder"
  description: "Disable Windows Steps Recorder"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\AppCompat"
      value: "DisableUAR"
      type: "REG_DWORD"
      data: "1"
