# Disable Activity Feed
# Removes timeline and activity tracking

---
- title: "Disable Activity Feed"
  description: "Disable Windows Timeline and activity feed"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\System"
      value: "EnableActivityFeed"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\System"
      value: "PublishUserActivities"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\System"
      value: "UploadUserActivities"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Timeline"
  description: "Remove Timeline from task view"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "SubscribedContent-353694Enabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "SubscribedContent-353696Enabled"
      type: "REG_DWORD"
      data: "0"
