# Disable Advertising
# Removes all advertising and suggestions from Windows

---
- title: "Disable Start Menu Suggestions"
  description: "Remove suggested apps from Start menu"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "SystemPaneSuggestionsEnabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "SubscribedContent-338388Enabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "SubscribedContent-338389Enabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "SubscribedContent-310093Enabled"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Lock Screen Tips"
  description: "Remove tips and tricks from lock screen"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "RotatingLockScreenEnabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "RotatingLockScreenOverlayEnabled"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Windows Spotlight"
  description: "Remove Windows Spotlight ads and suggestions"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "RotatingLockScreenEnabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "SubscribedContent-338387Enabled"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Tailored Experiences"
  description: "Disable personalized ads and recommendations"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\CloudContent"
      value: "DisableTailoredExperiencesWithDiagnosticData"
      type: "REG_DWORD"
      data: "1"

- title: "Disable App Suggestions"
  description: "Remove app suggestions from Settings"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "SilentInstalledAppsEnabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\ContentDeliveryManager"
      value: "SoftLandingEnabled"
      type: "REG_DWORD"
      data: "0"
