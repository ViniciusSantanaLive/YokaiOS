# Disable Web Search
# Removes Bing and web search from Start menu

---
- title: "Disable Web Search in Start Menu"
  description: "Remove Bing search results from Start menu"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\Explorer"
      value: "DisableSearchBoxSuggestions"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search"
      value: "ConnectedSearchUseWeb"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Windows Search"
      value: "DisableWebSearch"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Search"
      value: "BingSearchEnabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Search"
      value: "CortanaConsent"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Search Highlights"
  description: "Remove search highlights and suggestions"
  category: "Privacy"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\SearchSettings"
      value: "IsDynamicSearchBoxEnabled"
      type: "REG_DWORD"
      data: "0"
