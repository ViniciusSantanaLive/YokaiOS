---
title: Desabilitar Widgets
description: Desabilita e remove Widgets do Windows 11
privilege: Admin
actions:

  - !writeStatus: {status: "Desabilitando Widgets..."}

  - title: "Desabilitar Widgets via registro"
    description: "Remove Widgets da barra de tarefas"
    category: "Debloat"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Dsh"
        value: "AllowNewsAndInterests"
        type: "REG_DWORD"
        data: "0"
      - !registryValue
        path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
        value: "TaskbarDa"
        type: "REG_DWORD"
        data: "0"

  - title: "Remover pacote de Widgets"
    description: "Remove o app de Widgets"
    category: "Debloat"
    privilege: "Admin"
    actions:
      - !powershell
        command: |
          Get-Process *Widget* | Stop-Process -Force -ErrorAction SilentlyContinue
          Get-AppxPackage -Name "Microsoft.WidgetsPlatformRuntime" -AllUsers | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue
          Get-AppxPackage -Name "MicrosoftWindows.Client.WebExperience" -AllUsers | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue

  - title: "Desabilitar feed de Widgets"
    description: "Desabilita o feed de noticias dos Widgets"
    category: "Debloat"
    privilege: "Admin"
    actions:
      - !registryValue
        path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Feeds"
        value: "ShellFeedsTaskbarViewMode"
        type: "REG_DWORD"
        data: "2"

  - !writeStatus: {status: "Widgets desabilitados!"}
