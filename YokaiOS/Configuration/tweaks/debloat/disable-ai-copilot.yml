# Disable AI and Copilot
# Remove all AI components from Windows

---
- title: "Disable Windows Copilot"
  description: "Remove Microsoft Copilot completely"
  category: "Debloat"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsCopilot"
      value: "TurnOffWindowsCopilot"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsCopilot"
      value: "TurnOffWindowsCopilot"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Explorer\\Advanced"
      value: "ShowCopilotButton"
      type: "REG_DWORD"
      data: "0"
    - !powershell
      command: "Get-AppxPackage *Microsoft.Windows.Ai.Copilot.Provider* | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue"

- title: "Disable Recall"
  description: "Remove Windows Recall feature"
  category: "Debloat"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsAI"
      value: "DisableAIDataAnalysis"
      type: "REG_DWORD"
      data: "1"
    - !powershell
      command: "Get-AppxPackage *Microsoft.Windows.Recall* | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue"

- title: "Disable AI Features"
  description: "Disable all AI-powered features"
  category: "Debloat"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\WindowsAI"
      value: "DisableWindowsAI"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\WindowsAI"
      value: "DisableWindowsAI"
      type: "REG_DWORD"
      data: "1"

- title: "Remove AI Components from WinSxS"
  description: "Remove AI system components"
  category: "Debloat"
  privilege: "Admin"
  actions:
    - !powershell
      command: |
        $aiPackages = @(
          "Microsoft.Windows.Copilot",
          "Microsoft.Windows.Ai.Copilot.Provider",
          "Microsoft.Copilot",
          "Microsoft.Windows.Recall"
        )
        foreach ($pkg in $aiPackages) {
          Get-AppxPackage -Name $pkg -AllUsers | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue
          Get-AppxProvisionedPackage -Online | Where-Object {$_.PackageName -like "*$pkg*"} | Remove-AppxProvisionedPackage -Online -ErrorAction SilentlyContinue
        }
