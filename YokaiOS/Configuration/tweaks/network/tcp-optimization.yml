# Network Optimization (Master)
# Consolidated network optimizations for low-latency gaming
# This file replaces: disable-network-throttling.yml, nagle-algorithm.yml, dns-optimization.yml

---
- title: "Disable Nagle's Algorithm"
  description: "Reduce TCP packet batching for lower latency"
  category: "Network"
  privilege: "Admin"
  actions:
    - !powershell
      command: |
        $adapters = Get-NetAdapter | Where-Object {$_.Status -eq "Up"}
        foreach ($adapter in $adapters) {
          $interfaceGuid = $adapter.InterfaceGuid
          $regPath = "HKLM:\SYSTEM\CurrentControlSet\Services\Tcpip\Parameters\Interfaces\$interfaceGuid"
          if (Test-Path $regPath) {
            Set-ItemProperty -Path $regPath -Name "TcpAckFrequency" -Value 1 -Type DWord -Force
            Set-ItemProperty -Path $regPath -Name "TCPNoDelay" -Value 1 -Type DWord -Force
            Set-ItemProperty -Path $regPath -Name "TcpDelAckTicks" -Value 0 -Type DWord -Force
          }
        }
    - !registry
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters"
      name: "TcpDelAckTicks"
      type: "REG_DWORD"
      value: "0"
    - !registry
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Services\\Tcpip\\Parameters"
      name: "TcpMaxDataRetransmissions"
      type: "REG_DWORD"
      value: "5"

- title: "Optimize TCP Global Settings"
  description: "Configure TCP for low latency via netsh"
  category: "Network"
  privilege: "Admin"
  actions:
    - !cmd
      command: "netsh int tcp set global autotuninglevel=normal"
    - !cmd
      command: "netsh int tcp set global chimney=enabled"
    - !cmd
      command: "netsh int tcp set global dca=enabled"
    - !cmd
      command: "netsh int tcp set global netdma=enabled"
    - !cmd
      command: "netsh int tcp set global ecncapability=disabled"
    - !cmd
      command: "netsh int tcp set global timestamps=disabled"
    - !cmd
      command: "netsh int tcp set global rss=enabled"
    - !cmd
      command: "netsh int tcp set global nonsackrttresiliency=disabled"
    - !cmd
      command: "netsh int tcp set global maxsynretransmissions=2"
    - !cmd
      command: "netsh int tcp set global initialRto=2000"

- title: "Disable Network Throttling"
  description: "Remove Windows network throttling index"
  category: "Network"
  privilege: "Admin"
  actions:
    - !registry
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile"
      name: "NetworkThrottlingIndex"
      type: "REG_DWORD"
      value: "4294967295"
    - !registry
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile"
      name: "SystemResponsiveness"
      type: "REG_DWORD"
      value: "0"
    - !registry
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\Psched"
      name: "NonBestEffortLimit"
      type: "REG_DWORD"
      value: "0"

