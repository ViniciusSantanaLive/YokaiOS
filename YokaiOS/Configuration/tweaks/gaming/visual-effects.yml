# Visual Effects Optimization
# Disable unnecessary visual effects for gaming

---
- title: "Disable Visual Effects"
  description: "Remove animations and effects that consume GPU"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\Software\\Microsoft\\Windows\\CurrentVersion\\Explorer\\VisualEffects"
      value: "VisualFXSetting"
      type: "REG_DWORD"
      data: "2"
    - !registryValue
      path: "HKCU\\Control Panel\\Desktop"
      value: "UserPreferencesMask"
      type: "REG_BINARY"
      data: "9012038010000000"
    - !registryValue
      path: "HKCU\\Control Panel\\Desktop"
      value: "DragFullWindows"
      type: "REG_SZ"
      data: "0"
    - !registryValue
      path: "HKCU\\Control Panel\\Desktop"
      value: "FontSmoothing"
      type: "REG_SZ"
      data: "0"
    - !registryValue
      path: "HKCU\\Control Panel\\Desktop\\WindowMetrics"
      value: "MinAnimate"
      type: "REG_SZ"
      data: "0"

- title: "Disable Transparency"
  description: "Disable Aero transparency for better performance"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Themes\\Personalize"
      value: "EnableTransparency"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Cursor Shadow"
  description: "Remove cursor shadow effect"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\Control Panel\\Cursors"
      value: "CursorShadow"
      type: "REG_DWORD"
      data: "0"
