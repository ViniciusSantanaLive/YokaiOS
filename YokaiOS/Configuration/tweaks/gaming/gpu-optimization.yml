# GPU Optimization (Master)
# Consolidated GPU optimizations for gaming
# Replaces: gpu-optimization.yml, gpu-driver-optimization.yml

---
- title: "Enable Hardware-Accelerated GPU Scheduling"
  description: "Enable HAGS for lower latency"
  category: "GPU"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers"
      value: "HwSchMode"
      type: "REG_DWORD"
      data: "2"

- title: "Disable GPU Preemption"
  description: "Prevent GPU from preempting rendering tasks"
  category: "GPU"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\GraphicsDrivers\\Scheduler"
      value: "EnablePreemption"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Multi-Plane Overlay"
  description: "Disable MPO to reduce stuttering"
  category: "GPU"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows\\Dwm"
      value: "OverlayTestMode"
      type: "REG_DWORD"
      data: "5"

- title: "MMCS GPU Priority for Gaming"
  description: "Set maximum GPU priority for games"
  category: "GPU"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "GPU Priority"
      type: "REG_DWORD"
      data: "8"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "Priority"
      type: "REG_DWORD"
      data: "6"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "Scheduling Category"
      type: "REG_SZ"
      data: "High"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "SFIO Priority"
      type: "REG_SZ"
      data: "High"

- title: "NVIDIA PowerMizer - Force Max Performance"
  description: "Force NVIDIA GPU to maximum clock speeds"
  category: "GPU"
  privilege: "Admin"
  actions:
    - !powershell
      command: |
        # Detect NVIDIA GPU and apply PowerMizer settings
        $gpuPath = "HKLM:\SYSTEM\CurrentControlSet\Control\Class\{4d36e968-e325-11ce-bfc1-08002be10318}\0000"
        if (Test-Path $gpuPath) {
          New-ItemProperty -Path $gpuPath -Name "PerfLevelSrc" -Value 0x2222 -PropertyType DWord -Force -ErrorAction SilentlyContinue
          New-ItemProperty -Path $gpuPath -Name "PowerMizerEnable" -Value 1 -PropertyType DWord -Force -ErrorAction SilentlyContinue
          New-ItemProperty -Path $gpuPath -Name "PowerMizerLevel" -Value 1 -PropertyType DWord -Force -ErrorAction SilentlyContinue
          New-ItemProperty -Path $gpuPath -Name "PowerMizerLevelAC" -Value 1 -PropertyType DWord -Force -ErrorAction SilentlyContinue
        }

- title: "Disable GPU Interrupt Priority"
  description: "Set GPU interrupt priority for better performance"
  category: "GPU"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl"
      value: "IRQ8Priority"
      type: "REG_DWORD"
      data: "1"

- title: "Disable NVIDIA Telemetry Services"
  description: "Disable NVIDIA telemetry and streaming services"
  category: "GPU"
  privilege: "Admin"
  actions:
    - !service
      name: "NvTelemetryContainer"
      startup_type: "disabled"
      state: "stopped"
    - !service
      name: "NvStreamSvc"
      startup_type: "disabled"
      state: "stopped"

- title: "Disable NVIDIA Scheduled Tasks"
  description: "Disable NVIDIA telemetry scheduled tasks"
  category: "GPU"
  privilege: "Admin"
  actions:
    - !powershell
      command: |
        Get-ScheduledTask -TaskName "NvDriverUpdateCheck*" -ErrorAction SilentlyContinue | Disable-ScheduledTask -ErrorAction SilentlyContinue
        Get-ScheduledTask -TaskName "NVIDIA GeForce Experience SelfUpdate*" -ErrorAction SilentlyContinue | Disable-ScheduledTask -ErrorAction SilentlyContinue
        Get-ScheduledTask -TaskName "NvTmRep*" -ErrorAction SilentlyContinue | Disable-ScheduledTask -ErrorAction SilentlyContinue

- title: "Disable AMD Telemetry Services"
  description: "Disable AMD telemetry services"
  category: "GPU"
  privilege: "Admin"
  actions:
    - !service
      name: "AMDCrashDefenderService"
      startup_type: "disabled"
      state: "stopped"
    - !service
      name: "AMDExternalEventsUtility"
      startup_type: "disabled"
      state: "stopped"
