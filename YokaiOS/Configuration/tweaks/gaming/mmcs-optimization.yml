# MMCS Configuration
# Multimedia Class Scheduler Service optimization for gaming

---
- title: "Optimize MMCS for Gaming"
  description: "Configure Multimedia Class Scheduler Service for game prioritization"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile"
      value: "NetworkThrottlingIndex"
      type: "REG_DWORD"
      data: "10"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile"
      value: "SystemResponsiveness"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "GPU Priority"
      type: "REG_DWORD"
      data: "8"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "Priority"
      type: "REG_DWORD"
      data: "6"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "Scheduling Category"
      type: "REG_SZ"
      data: "High"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "SFIO Priority"
      type: "REG_SZ"
      data: "High"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "Background Only"
      type: "REG_SZ"
      data: "False"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "Clock Rate"
      type: "REG_DWORD"
      data: "10000"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "Affinity"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Games"
      value: "BackgroundPriority"
      type: "REG_DWORD"
      data: "0"

- title: "Optimize Audio Tasks"
  description: "Configure audio tasks for low latency"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Audio"
      value: "GPU Priority"
      type: "REG_DWORD"
      data: "8"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Audio"
      value: "Priority"
      type: "REG_DWORD"
      data: "6"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Audio"
      value: "Scheduling Category"
      type: "REG_SZ"
      data: "High"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Microsoft\\Windows NT\\CurrentVersion\\Multimedia\\SystemProfile\\Tasks\\Audio"
      value: "SFIO Priority"
