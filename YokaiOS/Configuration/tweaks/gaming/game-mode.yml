# Game Mode & Game Bar
# Consolidated: disables Game Mode, Game Bar, and Game DVR
# Replaces: game-mode.yml, disable-game-bar.yml

---
- title: "Disable Game Mode"
  description: "Disable Windows Game Mode to prevent stuttering"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\GameBar"
      value: "AllowAutoGameMode"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\GameBar"
      value: "AutoGameModeEnabled"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Game Bar"
  description: "Completely disable Xbox Game Bar"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\GameBar"
      value: "UseNexusForGameBarEnabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows\\GameDVR"
      value: "AllowGameDVR"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\System\\GameConfigStore"
      value: "GameDVR_Enabled"
      type: "REG_DWORD"
      data: "0"
    - !registryValue
      path: "HKCU\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\GameDVR"
      value: "AppCaptureEnabled"
      type: "REG_DWORD"
      data: "0"

- title: "Remove Game Bar Packages"
  description: "Uninstall Xbox Game Bar overlay packages"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !powershell
      command: |
        Get-AppxPackage Microsoft.XboxGameOverlay | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue
        Get-AppxPackage Microsoft.XboxGamingOverlay | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue
        Get-AppxPackage Microsoft.Xbox.TCUI | Remove-AppxPackage -AllUsers -ErrorAction SilentlyContinue

- title: "Disable Fullscreen Optimizations"
  description: "Force exclusive fullscreen for lower input lag"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKCU\\System\\GameConfigStore"
      value: "GameDVR_FSEBehaviorMode"
      type: "REG_DWORD"
      data: "2"
    - !registryValue
      path: "HKCU\\System\\GameConfigStore"
      value: "GameDVR_HonorUserFSEBehaviorMode"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKCU\\System\\GameConfigStore"
      value: "GameDVR_FSEBehavior"
      type: "REG_DWORD"
      data: "2"
    - !registryValue
      path: "HKCU\\System\\GameConfigStore"
      value: "GameDVR_DXGIHonorFSEWindowsCompatible"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKCU\\System\\GameConfigStore"
      value: "GameDVR_EFSEFeatureFlags"
      type: "REG_DWORD"
      data: "0"
