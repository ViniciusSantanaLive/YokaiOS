# Timer Resolution Optimization
# Sets system timer to 0.5ms for lower latency

---
- title: "Set Timer Resolution"
  description: "Configure system timer for 0.5ms resolution"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Session Manager\\kernel"
      value: "GlobalTimerResolutionRequests"
      type: "REG_DWORD"
      data: "1"
    - !cmd
      command: "bcdedit /set tscsyncpolicy enhanced"

- title: "Disable Dynamic Tick"
  description: "Force consistent timer behavior"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !cmd
      command: "bcdedit /set disabledynamictick yes"
    - !cmd
      command: "bcdedit /set useplatformtick yes"
