# CPU Scheduling Optimization for Gaming
# Prioritizes foreground game processes

---
- title: "Optimize CPU Priority for Games"
  description: "Set CPU priority class for foreground applications"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl"
      value: "Win32PrioritySeparation"
      type: "REG_DWORD"
      data: "38"

- title: "Disable CPU Core Parking"
  description: "Prevent CPU cores from sleeping during gaming"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\Power\\PowerSettings\\54533251-82be-4824-96c1-47b60b740d00\\0cc5b647-c1df-4637-891a-dec35c318583"
      value: "Attributes"
      type: "REG_DWORD"
      data: "0"

- title: "Disable Dynamic Tick"
  description: "Prevent CPU from entering low-power states"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !cmd
      command: "bcdedit /set disabledynamictick yes"

- title: "Set Platform Clock"
  description: "Force use of platform clock for consistent timing"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !cmd
      command: "bcdedit /set useplatformclock true"
    - !cmd
      command: "bcdedit /set useplatformtick yes"

- title: "Optimize Thread Quantum"
  description: "Reduce thread quantum for better responsiveness"
  category: "Gaming"
  privilege: "Admin"
  actions:
    - !registryValue
      path: "HKLM\\SYSTEM\\CurrentControlSet\\Control\\PriorityControl"
      value: "IRQ8Priority"
      type: "REG_DWORD"
      data: "1"
