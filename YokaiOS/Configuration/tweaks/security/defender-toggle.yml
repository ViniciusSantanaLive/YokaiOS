# Windows Defender Configuration
# Toggles Windows Defender on/off based on user selection

---
- title: "Disable Windows Defender"
  description: "Disable Windows Defender for maximum gaming performance"
  category: "Security"
  privilege: "Admin"
  option: "defender-disable"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows Defender"
      value: "DisableAntiSpyware"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection"
      value: "DisableRealtimeMonitoring"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection"
      value: "DisableBehaviorMonitoring"
      type: "REG_DWORD"
      data: "1"
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows Defender\\Real-Time Protection"
      value: "DisableScanOnRealtimeEnable"
      type: "REG_DWORD"
      data: "1"
    - !service: {name: 'WinDefend', operation: change, startup: 4}

- title: "Keep Windows Defender Enabled"
  description: "Keep Windows Defender active (default)"
  category: "Security"
  privilege: "Admin"
  option: "defender-enable"
  actions:
    - !registryValue
      path: "HKLM\\SOFTWARE\\Policies\\Microsoft\\Windows Defender"
      value: "DisableAntiSpyware"
      type: "REG_DWORD"
      data: "0"
    - !service: {name: 'WinDefend', operation: change, startup: 2}
