<Playbook>
	<Name>YokaiOS</Name>
	<Username>YokaiOS</Username>
	<Title>YokaiOS v2.0.0</Title>
	<ShortDescription>YokaiOS - Windows 11 Ultra-Optimized for Gaming</ShortDescription>
	<Description><![CDATA[╭───────────── YokaiOS ─────────────╮
│    Windows 11 Ultra-Optimized      │
│      for Gaming Performance        │
╰────────────────────────────────────╯

YokaiOS transforms your Windows 11 into a lean, mean gaming machine.
• 60-70 processes at idle
• Minimal RAM and CPU usage
• Ultra-low latency
• Maximum FPS boost
• Zero telemetry and bloat]]></Description>
	<Details>Ultra-optimized Windows 11 playbook focused on gaming performance, low latency, and minimal resource usage.</Details>
	<ProgressText><![CDATA[YokaiOS is applying gaming optimizations, removing bloat, and configuring your system for maximum performance.]]></ProgressText>
	<Version>2.0.0</Version>
	<SupportedBuilds>
		<!-- 24H2 -->
		<string>26100</string>
		<!-- 25H2 -->
		<string>26200</string>
	</SupportedBuilds>
	<Requirements>
		<Requirement>DefenderToggled</Requirement>
		<Requirement>NoAntivirus</Requirement>
		<Requirement>Internet</Requirement>
		<Requirement>NoPendingUpdates</Requirement>
		<Requirement>PluggedIn</Requirement>
	</Requirements>
	<UniqueId>00000000-0000-4000-796f-6b61696f733a</UniqueId>
	<Overhaul>true</Overhaul>
	<UseKernelDriver>false</UseKernelDriver>
	<AllowUnsupportedUpgrades>false</AllowUnsupportedUpgrades>
	<ProductCode>64</ProductCode>
	<EstimatedMinutes>10</EstimatedMinutes>
	<Git>https://github.com/ViniciusSantanaLive/YokaiOS</Git>
	<Website>https://github.com/ViniciusSantanaLive/YokaiOS</Website>
	<OOBE>
		<BulletPoints>
			<BulletPoint Icon="Rocket" Title="Gaming Performance"
			Description="Maximum FPS boost with ultra-low latency, optimized CPU scheduling, and disabled background processes."/>
			<BulletPoint Icon="Lock" Title="Zero Bloat"
			Description="All telemetry, advertising, and unnecessary components removed. 60-70 processes at idle."/>
			<BulletPoint Icon="Privacy" Title="Total Privacy"
			Description="Complete telemetry removal, disabled tracking, and no Microsoft account requirements."/>
		</BulletPoints>
		<Internet>Force</Internet>
	</OOBE>
	<ISO>
		<DisableBitLocker>true</DisableBitLocker>
		<DisableHardwareRequirements>true</DisableHardwareRequirements>
	</ISO>

	<!-- Software Selection -->
	<Software>
		<Package Option="browser-brave" DefaultWebBrowser="true">
			<Name>brave</Name>
			<Title>Brave</Title>
			<Description>Navegador focado em privacidade, baseado em Chromium. Bloqueia anuncios e trackers nativamente.</Description>
			<Icon>brave.png</Icon>
		</Package>
		<Package Option="browser-firefox" DefaultWebBrowser="true">
			<Name>firefox</Name>
			<Title>Firefox</Title>
			<Description>Navegador open-source com foco em privacidade e customizacao.</Description>
			<Icon>firefox.png</Icon>
		</Package>
		<Package Option="browser-librewolf" DefaultWebBrowser="true">
			<Name>librewolf</Name>
			<Title>LibreWolf</Title>
			<Description>Firefox hardened com foco total em privacidade e seguranca.</Description>
			<Icon>librewolf.png</Icon>
		</Package>
	</Software>

	<FeaturePages>
		<!-- Browser Selection -->
		<RadioImagePage CheckDefaultBrowser="true" DependsOn="software"
			DefaultOption="browser-brave" IsRequired="true"
			Description="Selecione o navegador que sera instalado como padrao.">
			<TopLine Text="Navegadores focados em privacidade e performance."/>
			<Options>
				<RadioImageOption None="true"/>
				<RadioImageOption>
					<Text>Brave</Text>
					<Name>browser-brave</Name>
					<FileName>brave</FileName>
					<GradientTopColor>#392DD1</GradientTopColor>
					<GradientBottomColor>#A91B78</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>Firefox</Text>
					<Name>browser-firefox</Name>
					<FileName>firefox</FileName>
					<GradientTopColor>#FF3647</GradientTopColor>
					<GradientBottomColor>#FFC742</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>LibreWolf</Text>
					<Name>browser-librewolf</Name>
					<FileName>librewolf</FileName>
					<GradientTopColor>#057DB6</GradientTopColor>
					<GradientBottomColor>#86D8FF</GradientBottomColor>
				</RadioImageOption>
			</Options>
			<BottomLine Text="Comparativo de privacidade" Link="https://privacytests.org/"/>
		</RadioImagePage>

		<!-- Defender Configuration -->
		<RadioPage IsRequired="true" DefaultOption="defender-disable" Description="Desativar o Defender libera recursos e reduz stuttering em jogos. Use antivirus de terceiros se necessario.">
			<TopLine Text="Defender consome CPU/RAM e pode causar micro-stutters."/>
			<Options>
				<RadioOption>
					<Text>Desativar Defender (Recomendado para Gaming)</Text>
					<Name>defender-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Manter Defender Ativado</Text>
					<Name>defender-enable</Name>
				</RadioOption>
			</Options>
			<BottomLine Text="Voce pode reativar depois na YokaiOS Toolbox"/>
		</RadioPage>

		<!-- Windows Update Configuration -->
		<RadioPage IsRequired="true" DefaultOption="updates-disable" Description="Atualizacoes automaticas podem causar travamentos e perda de performance durante jogos.">
			<TopLine Text="Voce pode atualizar manualmente quando quiser."/>
			<Options>
				<RadioOption>
					<Text>Desativar Atualizacoes Automaticas (Recomendado)</Text>
					<Name>updates-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Apenas Notificar sobre Atualizacoes</Text>
					<Name>updates-notify</Name>
				</RadioOption>
				<RadioOption>
					<Text>Manter Atualizacoes Automaticas</Text>
					<Name>updates-default</Name>
				</RadioOption>
			</Options>
			<BottomLine Text="Voce pode alterar depois na YokaiOS Toolbox"/>
		</RadioPage>

		<!-- Mitigations Configuration -->
		<RadioPage IsRequired="true" DefaultOption="mitigations-disable" Description="Mitigacoes de seguranca de CPU podem reduzir performance em 5-15%.">
			<TopLine Text="Desativar pode melhorar performance em CPUs mais antigas."/>
			<Options>
				<RadioOption>
					<Text>Desativar Todas as Mitigacoes (Maxima Performance)</Text>
					<Name>mitigations-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Manter Mitigacoes Padrao</Text>
					<Name>mitigations-default</Name>
				</RadioOption>
			</Options>
		</RadioPage>

		<!-- Hibernate Configuration -->
		<RadioPage IsRequired="true" DefaultOption="disable-hibernate" Description="Desativar libera espaco em disco e evita problemas com dual-boot.">
			<TopLine Text="Inclui Fast Startup"/>
			<Options>
				<RadioOption>
					<Text>Desativar Hibernacao (Recomendado)</Text>
					<Name>disable-hibernate</Name>
				</RadioOption>
				<RadioOption>
					<Text>Manter Hibernacao</Text>
					<Name>enable-hibernate</Name>
				</RadioOption>
			</Options>
			<BottomLine Text="Pode causar superaquecimento em sleep mode em notebooks"/>
		</RadioPage>

		<!-- Component Removal -->
		<CheckboxPage IsRequired="true" Description="Selecione os componentes que deseja remover.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Remover Microsoft Edge</Text>
					<Name>remove-edge</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover OneDrive</Text>
					<Name>remove-onedrive</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover IA (Recall &amp; Copilot)</Text>
					<Name>remove-ai</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover Microsoft Teams</Text>
					<Name>remove-teams</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover Cortana</Text>
					<Name>remove-cortana</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover Widgets</Text>
					<Name>remove-widgets</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="false">
					<Text>Remover Apps Xbox (mantem Game Bar para gravar)</Text>
					<Name>remove-xbox-apps</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover Apps Pre-Instalados (Bloatware)</Text>
					<Name>remove-bloatware</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Gaming Optimizations -->
		<CheckboxPage IsRequired="true" Description="Selecione as otimizacoes de gaming que deseja aplicar.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Game Bar e Game DVR</Text>
					<Name>disable-game-bar</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Fullscreen Optimizations (FSO)</Text>
					<Name>disable-fso</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Core Isolation (VBS)</Text>
					<Name>disable-core-isolation</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Mitigacoes de CPU</Text>
					<Name>disable-mitigations</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Plano de Energia Maxima Performance</Text>
					<Name>disable-power-saving</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Otimizar Timer Resolution (0.5ms)</Text>
					<Name>optimize-timer</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Aceleracao do Mouse</Text>
					<Name>disable-mouse-accel</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Otimizar CPU Priority para Jogos</Text>
					<Name>optimize-cpu-priority</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Network Optimizations -->
		<CheckboxPage IsRequired="true" Description="Selecione as otimizacoes de rede para baixa latencia.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Algoritmo de Nagle</Text>
					<Name>disable-nagle</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Otimizar TCP Settings</Text>
					<Name>optimize-tcp</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>DNS Cloudflare (1.1.1.1)</Text>
					<Name>dns-cloudflare</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Network Throttling</Text>
					<Name>disable-network-throttling</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Teredo</Text>
					<Name>disable-teredo</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Privacy -->
		<CheckboxPage IsRequired="true" Description="Selecione as configuracoes de privacidade.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Telemetria</Text>
					<Name>disable-telemetry</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Tracking e Advertising ID</Text>
					<Name>disable-tracking</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Activity Feed / Timeline</Text>
					<Name>disable-activity-feed</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Busca Web (Bing)</Text>
					<Name>disable-web-search</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Propagandas e Sugestoes</Text>
					<Name>disable-ads</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Location Tracking</Text>
					<Name>disable-location</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar SmartScreen</Text>
					<Name>disable-smartscreen</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Feedback e Diagnostics</Text>
					<Name>disable-feedback</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- General Configuration -->
		<CheckboxPage IsRequired="true" Description="Configuracoes gerais do sistema.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Ativar Modo Escuro</Text>
					<Name>configure-darkmode</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Ativar Menu de Contexto Classico</Text>
					<Name>configure-lcm</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Efeitos de Transparencia</Text>
					<Name>configure-te</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover itens fixados do Menu Iniciar</Text>
					<Name>remove-pinned-items-startmenu</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Mostrar Extensoes de Arquivo</Text>
					<Name>show-file-extensions</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Mostrar Arquivos Ocultos</Text>
					<Name>show-hidden-files</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Storage Sense</Text>
					<Name>disable-storage-sense</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Reserved Storage</Text>
					<Name>disable-reserved-storage</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Toolbox Installation -->
		<CheckboxPage IsRequired="true" Description="Instalar a YokaiOS Toolbox para gerenciar as otimizacoes apos a instalacao.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Instalar YokaiOS Toolbox</Text>
					<Name>install-toolbox</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Iniciar YokaiOS Toolbox com o Windows</Text>
					<Name>toolbox-startup</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>
	</FeaturePages>
</Playbook>
