<Playbook>
	<Name>YokaiOS</Name>
	<Username>YokaiOS</Username>
	<Title>YokaiOS v2.0.0</Title>
	<ShortDescription>YokaiOS - Windows 11 Ultra-Optimized for Gaming</ShortDescription>
	<Description><![CDATA[YokaiOS - Windows 11 Ultra-Optimized for Gaming

60-70 processes at idle
Minimal RAM and CPU usage
Ultra-low latency
Maximum FPS boost
Zero telemetry and bloat]]></Description>
	<Details>Ultra-optimized Windows 11 playbook focused on gaming performance.</Details>
	<ProgressText>Applying YokaiOS optimizations...</ProgressText>
	<Version>2.0.0</Version>
	<UniqueId>fee2cc73-d30b-4853-b0e2-12cbcf921bd0</UniqueId>
	<SupportedBuilds>
		<string>26100</string>
		<string>26200</string>
	</SupportedBuilds>
	<Requirements>
		<Requirement>Internet</Requirement>
		<Requirement>NoPendingUpdates</Requirement>
	</Requirements>
	<Git>https://github.com/ViniciusSantanaLive/YokaiOS</Git>

	<FeaturePages>
		<!-- Browser Selection -->
		<RadioImagePage CheckDefaultBrowser="true" DefaultOption="browser-brave" IsRequired="true"
			Description="Selecione o navegador padrao.">
			<Options>
				<RadioImageOption None="true"/>
				<RadioImageOption>
					<Text>Brave</Text>
					<Name>browser-brave</Name>
					<FileName>brave</FileName>
					<GradientTopColor>#ff7a52</GradientTopColor>
					<GradientBottomColor>#e63a00</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>Firefox</Text>
					<Name>browser-firefox</Name>
					<FileName>firefox</FileName>
					<GradientTopColor>#ffb64d</GradientTopColor>
					<GradientBottomColor>#e44d26</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>LibreWolf</Text>
					<Name>browser-librewolf</Name>
					<FileName>librewolf</FileName>
					<GradientTopColor>#4dc3ff</GradientTopColor>
					<GradientBottomColor>#0066b3</GradientBottomColor>
				</RadioImageOption>
			</Options>
		</RadioImagePage>

		<!-- Defender -->
		<RadioPage IsRequired="true" DefaultOption="defender-disable" Description="Defender consome CPU/RAM.">
			<Options>
				<RadioOption>
					<Text>Desativar Defender</Text>
					<Name>defender-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Manter Defender</Text>
					<Name>defender-enable</Name>
				</RadioOption>
			</Options>
		</RadioPage>

		<!-- Windows Update -->
		<RadioPage IsRequired="true" DefaultOption="updates-disable" Description="Atualizacoes automaticas.">
			<Options>
				<RadioOption>
					<Text>Desativar Updates</Text>
					<Name>updates-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Notificar Apenas</Text>
					<Name>updates-notify</Name>
				</RadioOption>
				<RadioOption>
					<Text>Manter Automatico</Text>
					<Name>updates-default</Name>
				</RadioOption>
			</Options>
		</RadioPage>

		<!-- Mitigations -->
		<RadioPage IsRequired="true" DefaultOption="mitigations-disable" Description="Mitigacoes de CPU.">
			<Options>
				<RadioOption>
					<Text>Desativar Mitigacoes</Text>
					<Name>mitigations-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Manter Padrao</Text>
					<Name>mitigations-default</Name>
				</RadioOption>
			</Options>
		</RadioPage>

		<!-- Hibernate -->
		<RadioPage IsRequired="true" DefaultOption="disable-hibernate" Description="Hibernacao e Fast Startup.">
			<Options>
				<RadioOption>
					<Text>Desativar Hibernacao</Text>
					<Name>disable-hibernate</Name>
				</RadioOption>
				<RadioOption>
					<Text>Manter Hibernacao</Text>
					<Name>enable-hibernate</Name>
				</RadioOption>
			</Options>
		</RadioPage>

		<!-- Debloat Part 1 -->
		<CheckboxPage IsRequired="true" Description="Remover componentes desnecessarios.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Remover Microsoft Edge</Text>
					<Name>remove-edge</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover OneDrive</Text>
					<Name>remove-onedrive</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover IA (Recall &amp; Copilot)</Text>
					<Name>remove-ai</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover Teams</Text>
					<Name>remove-teams</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Debloat Part 2 -->
		<CheckboxPage IsRequired="true" Description="Mais componentes para remover.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Remover Cortana</Text>
					<Name>remove-cortana</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover Widgets</Text>
					<Name>remove-widgets</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="false">
					<Text>Remover Xbox Apps</Text>
					<Name>remove-xbox-apps</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover Bloatware</Text>
					<Name>remove-bloatware</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Gaming Part 1 -->
		<CheckboxPage IsRequired="true" Description="Otimizacoes de gaming.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Game Bar e DVR</Text>
					<Name>disable-game-bar</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar FSO</Text>
					<Name>disable-fso</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Core Isolation</Text>
					<Name>disable-core-isolation</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Mitigacoes CPU</Text>
					<Name>disable-mitigations</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Gaming Part 2 -->
		<CheckboxPage IsRequired="true" Description="Mais otimizacoes de gaming.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Plano Maxima Performance</Text>
					<Name>disable-power-saving</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Timer Resolution 0.5ms</Text>
					<Name>optimize-timer</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Aceleracao Mouse</Text>
					<Name>disable-mouse-accel</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>CPU Priority para Jogos</Text>
					<Name>optimize-cpu-priority</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Network -->
		<CheckboxPage IsRequired="true" Description="Otimizacoes de rede.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Nagle</Text>
					<Name>disable-nagle</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Otimizar TCP</Text>
					<Name>optimize-tcp</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>DNS Cloudflare</Text>
					<Name>dns-cloudflare</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Throttling</Text>
					<Name>disable-network-throttling</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Privacy Part 1 -->
		<CheckboxPage IsRequired="true" Description="Configuracoes de privacidade.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Telemetria</Text>
					<Name>disable-telemetry</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Tracking</Text>
					<Name>disable-tracking</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Activity Feed</Text>
					<Name>disable-activity-feed</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Busca Web</Text>
					<Name>disable-web-search</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Privacy Part 2 -->
		<CheckboxPage IsRequired="true" Description="Mais opcoes de privacidade.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Propagandas</Text>
					<Name>disable-ads</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Location</Text>
					<Name>disable-location</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar SmartScreen</Text>
					<Name>disable-smartscreen</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Feedback</Text>
					<Name>disable-feedback</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- General Part 1 -->
		<CheckboxPage IsRequired="true" Description="Configuracoes gerais.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Modo Escuro</Text>
					<Name>configure-darkmode</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Menu Contexto Classico</Text>
					<Name>configure-lcm</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Transparencia</Text>
					<Name>configure-te</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remover Itens Fixados</Text>
					<Name>remove-pinned-items-startmenu</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- General Part 2 -->
		<CheckboxPage IsRequired="true" Description="Mais configuracoes gerais.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Mostrar Extensoes</Text>
					<Name>show-file-extensions</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Mostrar Arquivos Ocultos</Text>
					<Name>show-hidden-files</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Storage Sense</Text>
					<Name>disable-storage-sense</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Desativar Reserved Storage</Text>
					<Name>disable-reserved-storage</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Toolbox -->
		<CheckboxPage IsRequired="true" Description="Instalar YokaiOS Toolbox.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Instalar Toolbox</Text>
					<Name>install-toolbox</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Iniciar com Windows</Text>
					<Name>toolbox-startup</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>
	</FeaturePages>
</Playbook>