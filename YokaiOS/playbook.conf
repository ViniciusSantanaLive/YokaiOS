<Playbook>
	<Name>YokaiOS</Name>
	<Username>YokaiOS</Username>
	<Title>YokaiOS v1.0.0</Title>
	<ShortDescription>YokaiOS - Windows 11 Ultra-Optimized for Gaming</ShortDescription>
	<Description><![CDATA[╭───────────── YokaiOS ─────────────╮
│    Windows 11 Ultra-Optimized      │
│      for Gaming Performance        │
╰────────────────────────────────────╯

YokaiOS transforms your Windows 11 into a lean, mean gaming machine.
• 60-70 processes at idle
• Minimal RAM and CPU usage
• Ultra-low latency
• Maximum FPS boost
• Zero telemetry and bloat]]></Description>
	<Details>Ultra-optimized Windows 11 playbook focused on gaming performance, low latency, and minimal resource usage.</Details>
	<ProgressText><![CDATA[YokaiOS is applying gaming optimizations, removing bloat, and configuring your system for maximum performance.]]></ProgressText>
	<Version>1.0.0</Version>
	<SupportedBuilds>
		<!-- 24H2 -->
		<string>26100</string>
		<!-- 25H2 -->
		<string>26200</string>
	</SupportedBuilds>
	<Requirements>
		<Requirement>DefenderToggled</Requirement>
		<Requirement>NoAntivirus</Requirement>
		<Requirement>Internet</Requirement>
		<Requirement>NoPendingUpdates</Requirement>
		<Requirement>PluggedIn</Requirement>
	</Requirements>
	<UniqueId>00000000-0000-4000-796f-6b61696f733a</UniqueId>
	<Overhaul>true</Overhaul>
	<UseKernelDriver>false</UseKernelDriver>
	<AllowUnsupportedUpgrades>false</AllowUnsupportedUpgrades>
	<ProductCode>64</ProductCode>
	<EstimatedMinutes>10</EstimatedMinutes>
	<Git>https://github.com/YokaiOS/YokaiOS</Git>
	<Website>https://yokaios.net</Website>
	<OOBE>
		<BulletPoints>
			<BulletPoint Icon="Rocket" Title="Gaming Performance"
			Description="Maximum FPS boost with ultra-low latency, optimized CPU scheduling, and disabled background processes."/>
			<BulletPoint Icon="Lock" Title="Zero Bloat"
			Description="All telemetry, advertising, and unnecessary components removed. 60-70 processes at idle."/>
			<BulletPoint Icon="Privacy" Title="Total Privacy"
			Description="Complete telemetry removal, disabled tracking, and no Microsoft account requirements."/>
		</BulletPoints>
		<Internet>Force</Internet>
	</OOBE>
	<ISO>
		<DisableBitLocker>true</DisableBitLocker>
		<DisableHardwareRequirements>true</DisableHardwareRequirements>
	</ISO>
	<FeaturePages>
		<!-- Defender Configuration -->
		<RadioPage IsRequired="true" DefaultOption="defender-disable" Description="For maximum gaming performance, Defender should be disabled. Use third-party antivirus if needed.">
			<TopLine Text="Defender consumes resources and can cause stuttering in games."/>
			<Options>
				<RadioOption>
					<Text>Disable Defender (Recommended for Gaming)</Text>
					<Name>defender-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Keep Defender Enabled</Text>
					<Name>defender-enable</Name>
				</RadioOption>
			</Options>
		</RadioPage>

		<!-- Mitigations Configuration -->
		<RadioPage IsRequired="true" DefaultOption="mitigations-disable" Description="Disabling CPU mitigations improves performance on most systems, especially older CPUs.">
			<TopLine Text="Security mitigations can reduce gaming performance by 5-15%."/>
			<Options>
				<RadioOption>
					<Text>Disable All Mitigations (Maximum Performance)</Text>
					<Name>mitigations-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Keep Default Mitigations</Text>
					<Name>mitigations-default</Name>
				</RadioOption>
			</Options>
		</RadioPage>

		<!-- Updates Configuration -->
		<RadioPage IsRequired="true" DefaultOption="auto-updates-disable" Description="Automatic updates can cause interruptions and performance drops during gaming.">
			<TopLine Text="You can manually update when convenient."/>
			<Options>
				<RadioOption>
					<Text>Disable Automatic Updates (Recommended)</Text>
					<Name>auto-updates-disable</Name>
				</RadioOption>
				<RadioOption>
					<Text>Keep Automatic Updates</Text>
					<Name>auto-updates-default</Name>
				</RadioOption>
			</Options>
		</RadioPage>

		<!-- Hibernate Configuration -->
		<RadioPage IsRequired="true" DefaultOption="disable-hibernate" Description="Disabling frees disk space and prevents dual-boot or upgrade instability.">
			<TopLine Text="This includes Fast Startup"/>
			<Options>
				<RadioOption>
					<Text>Disable Hibernate (Recommended)</Text>
					<Name>disable-hibernate</Name>
				</RadioOption>
				<RadioOption>
					<Text>Enable Hibernate</Text>
					<Name>enable-hibernate</Name>
				</RadioOption>
			</Options>
		</RadioPage>

		<!-- Component Removal -->
		<CheckboxPage IsRequired="true" Description="Select components to remove for a leaner system.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Remove Microsoft Edge</Text>
					<Name>remove-edge</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove OneDrive</Text>
					<Name>remove-onedrive</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove AI (Recall &amp; Copilot)</Text>
					<Name>remove-ai</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove Microsoft Teams</Text>
					<Name>remove-teams</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove Cortana</Text>
					<Name>remove-cortana</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove Xbox Apps (except Game Bar overlay)</Text>
					<Name>remove-xbox-apps</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove All Bloatware Apps</Text>
					<Name>remove-bloatware</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- Gaming Optimizations -->
		<CheckboxPage IsRequired="true" Description="Select gaming optimizations to apply.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Disable Game Bar and Game DVR</Text>
					<Name>disable-game-bar</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Disable Fullscreen Optimizations</Text>
					<Name>disable-fso</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Disable Core Isolation (VBS)</Text>
					<Name>disable-core-isolation</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Disable All CPU Mitigations</Text>
					<Name>disable-mitigations</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Maximum Performance Power Plan</Text>
					<Name>disable-power-saving</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>

		<!-- General Configuration -->
		<CheckboxPage IsRequired="true" Description="General configuration options.">
			<Options>
				<CheckboxOption IsChecked="true">
					<Text>Enable Dark Mode</Text>
					<Name>configure-darkmode</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Enable Legacy Context Menu</Text>
					<Name>configure-lcm</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Disable Transparency Effects</Text>
					<Name>configure-te</Name>
				</CheckboxOption>
				<CheckboxOption IsChecked="true">
					<Text>Remove pinned items in Start Menu</Text>
					<Name>remove-pinned-items-startmenu</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>
	</FeaturePages>
</Playbook>
